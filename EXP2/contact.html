<!DOCTYPE html>
<html>
<head>
    <title>MyShop - Contact</title>
    <meta charset="UTF-8">
</head>
<body>

<header>
    <h1>Contact & Checkout</h1>
</header>

<nav>
    <a href="index.html">Home</a> |
    <a href="products.html">Products</a> |
    <a href="cart.html">Cart</a> |
    <a href="contact.html">Contact</a>
</nav>

<main>
    <section>
        <form>
            <fieldset>
                <legend>Customer Information</legend>

                <label>Name:</label><br>
                <input type="text" required><br><br>

                <label>Email:</label><br>
                <input type="email" required><br><br>

                <label>Address:</label><br>
                <textarea rows="4" cols="30"></textarea><br><br>
            </fieldset>

            <fieldset>
                <legend>Payment Method</legend>

                <input type="radio" name="payment"> Credit Card<br>
                <input type="radio" name="payment"> Debit Card<br>
                <input type="radio" name="payment"> Cash on Delivery<br><br>
            </fieldset>

            <details>
                <summary>Shipping Policy</summary>
                <p>Products will be delivered within 5-7 business days.</p>
            </details>

            <br>
            <input type="submit" value="Place Order">
        </form>
    </section>
</main>

<footer>
    <p>&copy; 2026 MyShop</p>
</footer>

</body>
</html>
